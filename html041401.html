<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>연습용01</title>
    <style>
        h1{
            color: lightblue;
            font-size: 150px;
            text-align: center;
        }
    </style>
    <style>
        h2{
            color: blue;
            font-size: 100px;
            text-align: right;
        }
        .red{
            color: red;
        }
        .blue{
            color: blue;
        }
        .yellow{
            color: yellow;
        }
        .exe{
            color: darkblue;
            font-size: 200px;
        }
    </style>
</head>
<body>
   <h1><span class="exe">연습</span>페이지</h1> 
   <h2>연습페이지</h2>
   <p class="red">연습페이지1</p>
   <p class="blue">연습페이지2</p>
   <p class="yellow">연습페이지3</p>
</body>
</html>
