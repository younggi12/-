<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피부에도 안심</title>
</head>
<style>
    p{
        font-weight: bold;
        font-size: 150px;
    }
    .ansim{
        color: blue;
        font-weight:500;
    }

    .box1{
        width: 800px;
        height: 100px;
        background-color: gold;
        border: 0.5px solid orange;
        border-radius: 10px;
        box-shadow: 1px 1px 2px #ddd ;
        /* 오른쪽크기 아래크기 번지기 그림자색상 */
        text-align: center;
        line-height: 100px;
    }
</style>
<body>
    <p>피부에도 <span class="ansim">안심</span></p>
    <div class="box1">나는 박스</div>
</body>
</html>
