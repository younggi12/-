<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      .outbox{
         width: 380px;
         height: 80px;
         /* background-color: skyblue; */
         display: flex;
         justify-content: space-between;
         align-items: center;
         
      }
      .inbox{
        width: 80px;
        height: 80px;
        border-radius: 50%;
        /* background-color: blue; */
        box-shadow: 0px 5px 16px rgba(0, 0, 0,0.2);
        text-align: center;
        line-height: 80px;
        font-size: 40px;
            

      }
     .inbox:hover{
       box-shadow: 0px 5px 16px rgba(0, 0, 0,0.6);
       transition: all 0.3s;

     }
    </style>
</head>
<body>
    <div class="outbox">
        <div class="inbox">1</div>
        <div class="inbox">2</div>
        <div class="inbox">3</div>
        <div class="inbox">4</div>
    </div>
</body>
</html>
