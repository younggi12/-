<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
       .box{
           width: 100px;
           height: 100px;
           font-size: 30px;
           font-weight: bold;
           text-align: center;
           line-height: 100px;
           transition: all 0.3s;
       }
       .box1{
        background-color: lightgreen;
       }
       .box1:hover{
        transform: scale(2);
       }
       .box2{
        background-color: skyblue;
       }
       .box2:hover{
        transform: rotate(50deg);
       }
       .box3{
        background-color: pink;
       }
       .box3:hover{
        transform:translateX(100px);
       }
    </style>
</head>
<body>
    <div class="box box1">s</div>
    <div class="box box2">r</div>
    <div class="box box3">l</div>
</body>
</html>
