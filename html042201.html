<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outbox{
            position: absolute;
            width: 500px;
            height: 500px;
            background-color: gold;
            margin: 50px auto;
        }

        .inbox{
            width: 100px;
            height: 100px;  
        }

        .box1{
            background-color: red;
            position: relative;
            left: 100px;
            top: 50px;
        }

        .box2{
            background-color: blue;
            position: relative;
            left: 70px;
            top: 70px;
        }
    </style>
</head>
<body>
        <h1>box</h1>
        <div class="inbox box1">box1</div>
        <div class="inbox box2">box2</div>

</body>
</html>
<!-- 부모 relative  상대적 -->
<!-- 자식 absolute  절대적 -->
