<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border-collapse: collapse;
            width: 500px;
            height: 100px;

            

        }
        *{margin: 0; padding: 0;}
        th{
            background-color: lightslategrey;
            color: white;
            border: 1px solid black;
            text-align: center;
            padding: 10px;
        }
        tr,td{
            text-align: center;
            padding: 5px;
            border: 1px solid black;

        }

        .gray{
            background-color:wheat;

        }

        .white{
            background-color: white;
        }
    </style>
</head>
<body>
    <table>
    <tr>
        <th>시간</th>
        <th>월요일</th>
        <th>화요일</th>
        <th>수요일</th>   
        <th>수요일</th>         
    </tr>

    <tr class="gray">
        <td>09:00</td>
        <td>영어</td>
        <td>수학</td>
        <td>과학</td>
        <td>체육</td>
        </tr>
    </tr>

    <tr>
        <td>10:00</td>
        <td>국어</td>
        <td>영어</td>
        <td>사회</td>
        <td>음악</td>
    </tr>

    <tr class="gray">
        <td>11:00</td>
        <td colspan="2">프로젝트수업</td>
        <td>수학</td>
        <td>미술</td>
    </tr>
    </table>
</body>
</html>
