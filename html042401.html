<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{padding: 0; margin: 0;}
    .blackbox{
        display: flex;
        justify-content: start;
        align-items: center;
        background-color: black;
        padding: 5px;
        width: 100%;
        height: 70px;
    }
    .logobox{

        width: 20%;
        height: 100%;
        display: flex;
        justify-content: start;
        align-items: center;
        padding-left: 40px;
        

    }
    .logobox .logoimg{
        width: 35%;
        object-fit: cover;

    }
     .menubox{
        width: 50%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 70px;
        color: white;
        font-weight: bold;
        font-size: 18px;
     }
     .xxx{
        width: 25%;
        height: 30%;
        color: darkgrey;
        display: flex;
        justify-content: right;
        align-items: center;
        text-align: center;
        font-size: 20px;
     }
     .spaceimg{
        width: 100%;
        height: 400px;
        display: flex;
        justify-content: center;
        align-items: center;
     }

     .menubox2{
        width: 50%;
        height: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: brown;
        font-weight: bold;
        font-size: 18px;
        color: orange;
     }
     .menubox3{
        width: 50%;
        height: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: red;
        color: white;
        font-weight: bold;
        font-size: 40px;
     }
    </style>
</head>
<body>
  <div class="blackbox">
    <div class="logobox">
        <img src="./iMG/STK.png"   class="logoimg" alt="logo" />
    </div>
    <div class="menubox">
        <span>STK</span>
        <span>전시회 구성</span>
        <span>참가업체</span>
        <span>참관객</span>
        <span>프로그램</span>
        <span>미디어센터</span>
    </div>
    <div class="xxx">KOR</div>
    </div>
  </div>
   </div>

   <div>
    <img src="./iMG/space.jfif" class="spaceimg" alt="si"/>
    <div class="menubox2">
        <span>스마트테크 코리아</span>
    <div class="menubox3">
        <span>참가안내</span>
    </div>
    </div>
</body>
</html>
