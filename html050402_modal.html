<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 모달</title>

    <link rel="stylesheet" href="./reset.css">

    <style>
       .bich{
          width: 50%;
          height: 200px;

        }

        .smallbox{
            width: 80%;
            height: 100%;
            

        }

        .modal_box{
            width: 100%;
            height: 100vh;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            left: 0; top: 0;

        }

        .modal_box on{
            display: flex;
        }

        .bigimgbox{
           position: relative;
           width: 50%;
           height: 200px;
           background-color: white;

        }

        #btn{
            position: absolute;
            right: 10px; top: 10px;

        }

        .bigimgbox img{
            width: 80%;
            height: 80%;
            object-fit: cover;

        }
    </style>
      
    
</head>
<body>

    <div class="smallbox">
    <img id="bich" src="./iMG/bich.png" alt="img" />

    </div>
    <div class="modal_box on">
        <div class="bigimgbox">
            <button id="btn">닫기</button>
            <img src="./iMG/man.jpg" alt="bigimg" />
        </div>
    </div>

</body>
</html>
