<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        body{
            height: 100vh;
        }
        .imgBoxs{
            width: 100%;
            height: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            
            
            
        }

        .imgBoxs:hover{
            transition: all 0.8s;
            transform: scale(2);
        }

        .imgBoxs img{
            width: 200px;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid white;
        }

        /* 모달박스 처리 */
        .big_imgBoxs{
            position: fixed;
            left: 0; top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display:none;
            justify-content: center;
            align-items: center;
        }
        .big_imgBoxs.on{
            display: flex;
        }
        .big{
            width: 50%;
            height: 80%;
            background-color: black;
            border-radius: 10px;
            position: relative;
        }
        #close{
            background-color: #333;
            color: white;
            font-size: 13px;
            padding: 5px;
            position: absolute;
            right: 10px; top: 10px;
        }

        .modal_imgBoxs img{
            width: 80%;   
            height: 70%;
            object-fit: cover;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }
        .modal_imgBoxs img.on{
            display: block;
        }
    </style>
</head>
<body>
    <div class="imgBoxs">
        <img src="./img/park.jfif" alt="img1" /> 박보영
    </div>

    <div class="big_imgBoxs ">
        <div class="big">
            <button id="close">닫기</button>
            <div class="modal_imgBoxs">
                <img  src="./img/park.jfif" alt="img1" />
            </div>
        </div>
    </div>
    <script>
        let opens = document.querySelectorAll(".imgBoxs img")
        , big_imgBoxs = document.querySelector(".big_imgBoxs")
        , modal_imgBoxs = document.querySelectorAll(".modal_imgBoxs img")
        , close = document.querySelector("#close")

        opens.forEach(function(item, idx){
            item.addEventListener("click", function(){
                modal_imgBoxs.forEach( function(imgs){
                    imgs.classList.remove("on")
                })
                
                big_imgBoxs.classList.add("on")
                modal_imgBoxs[idx].classList.add("on")
            })
        })

        close.addEventListener("click", function(){
            big_imgBoxs.classList.remove("on")
        })
    </script>
</body>
</html>
