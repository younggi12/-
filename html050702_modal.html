<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap{
            width: 500px;
            height: 500px;
             /* background-color: skyblue; */
        }
        .bigBox{
            width: 100%;
            height: 70%;
            /* background-color: pink; */
            overflow: hidden;
            position: relative;
        }

        .bigBox img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            left: 0; top: 0;
            opacity: 0;
            transition: all 0.3s;
        }

        .bigBox img.on{
            opacity: 1;
        }

        .smallBox{
            width: 100%;
            height: 30%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .smallBox img{
            width: 20%;
            height: 30%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="bigBox">
            <img  class="on" src="./img/park2.jpg">
            <img src="./img/park3.jpg">
            <img src="./img/park4.webp">
        </div>

        <div class="smallBox">
            <img src="./img/park2.jpg">
            <img src="./img/park3.jpg">
            <img src="./img/park4.webp">
        </div>
    </div>
    <script>
        let bigImg = document.querySelectorAll(".bigBox img")
        let smallImg = document.querySelectorAll(".smallBox img")

        smallImg.forEach(function(item, idx){
            item.addEventListener("mouseenter", function(){
                bigImg.forEach(function(bimg){
                    bimg.classList.remove("on")
                })

                bigImg[idx].classList.add("on")
            })
        })
    </script>
</body>
</html>
