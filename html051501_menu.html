<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gnb, snb, fullmenu, observe</title>
    <link rel="stylesheet" href="./reset.css" >
    <style>
        header{
            width: 100%;
            height: 90px;
        }
        .nav{
            position: fixed;
            left: 0; top: 0;
            width: 100%;
            height: 90px;
            background-color: darkblue;
            color: white;
            display: flex;
            justify-content: center;
            transition: all 0.3s;
            overflow: hidden;
            z-index: 10;
        }
        .nav.on{
            height: 490px;
        }
        .logoBox{
            width: 20%;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            font-weight: bold;
        }
        .gnb{
            width: 70%;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .gnb > li{
            width: calc(95%/4);
            height: 90px;
        }
        .gnb > li > a {         
            width: 100%;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 25px;
            font-weight: 700;            
        }
        .ham{
            width: 10%;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 3px;
            cursor: pointer;
        }
        .ham span{
            width: 30px;
            height: 4px;
            background-color: white;
        }
        .snb{
            margin-top: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap:10px;
        }
        .fullmenu{
            width: 100%;
            height: 100vh;
            background-color: rgba(0,0,0,0.7);
            position: fixed;
            left: 0; top: -100%;
            z-index: 100;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .fullmenu.on{
            top: 0;
        }
        .closebtn{
            position: absolute;
            right: 30px; top: 30px;
            width: 30px; 
            height: 30px;
            border-radius: 1px;
            background-color: skyblue;
            font-size: 20px;
            font-weight: bold;
        }
        .fullgnb{
            width: 80%;
            height: 80%;
            border-radius: 10px;
            display: flex;
            justify-content: space-around;
        }
        .fullgnb > li{
            width: calc(90%/4);
            height: 100%;
            margin-top: 50px;
        }
        .fullgnb > li > a{
            display: block;
            width: 100%;
            height: 100px;
            font-size: 30px;
            font-weight: bold;
            color: white;
            text-align: center;
            line-height: 100px;
        }
        .fullsnb{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .fullsnb li a{
            color: white;
            font-size: 18px;
        }
        section{
            width: 100%;
            height: 100vh;
            display: none;
        }
        section.on{
            display: block;
        }
        #se01{ background-color: whitesmoke; }
        #se01.on{ display: block; }
        #se02, #se03, #se04, #se05, #se06, #se07, #se08, #se09, #se10{
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 70px;
        }
        #se02.on, #se03.on, #se04.on, #se05.on, #se06.on,
        #se07.on, #se08.on, #se09.on, #se10.on {
            display: flex;
        }
        #se02{ background-color: skyblue; }
        #se03{ background-color: gold; }
        #se04{ background-color: lightcoral; }
        #se05{ background-color: lightgreen; }
        #se06{ background-color: gold; }
        #se07{ background-color: lightblue; }
        #se08{ background-color: lightgreen; }
        #se09{ background-color: lightpink; }
        #se10{ background-color: lightcoral; }
        .outbox{
            width: 100%;
            display: flex;
            justify-content: start;
            align-items: start;
            flex-direction: column;
        }
        .imgbox{
            width: 100%;
            height: 350px;
            background-color: blue;
            overflow: hidden;
        }
        .imgbox > img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .textbox{
            margin-top: 150px;
            width: 100%;
            height: 405px;
            background-color: wheat;
            font-size: 30px;
            font-weight: bold;
            transform: translateX(100px);
            transition: all 0.3s;
        }
        .scaleitem{
            transition: all 0.3s; 
            transform-origin: center;
            opacity: 0.7;
        }
        .scaleitem > img{
            transform: scale(1.3);
            transition: all 0.3s;
        }
        .scaleitem.on > img {        
            transform: scale(1);
        }
        .upitem{
            transform: translateY(100px);
            transition: all 0.3s; 
        }
        .upitem.on{
            transform: translateY(0);
            transition-delay: 0.5s;
        }
    </style>
</head>
<body>
    <header>
        <nav class="nav">
            <div class="logoBox">
                <a href="#" onclick="onpage(0)">logo</a>
            </div>
            <ul class="gnb">
                <li>
                    <a href="#" onclick="onpage(0)">회사소개</a>
                    <ul class="snb">
                        <li><a href="#" onclick="onpage(1)">회사연혁</a></li>
                        <li><a href="#" onclick="onpage(2)">회사기술</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#" onclick="onpage(3)">상품</a>
                    <ul class="snb">
                        <li><a href="#" onclick="onpage(4)">마스크</a></li>
                        <li><a href="#" onclick="onpage(5)">의류</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#" onclick="onpage(6)">회사위치</a>
                    <ul class="snb">
                        <li><a href="#" onclick="onpage(7)">오시는길</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#" onclick="onpage(8)">고객문의</a>
                    <ul class="snb">
                        <li><a href="#" onclick="onpage(9)">문의사항</a></li>
                    </ul>
                </li>
            </ul>
            <div class="ham">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <div class="fullmenu">
        <button class="closebtn">X</button>
        <ul class="fullgnb">
            <li>
                <a href="#" onclick="onpage(0)">회사소개</a>
                <ul class="fullsnb">
                    <li><a href="#" onclick="onpage(1)">회사연혁</a></li>
                    <li><a href="#" onclick="onpage(2)">회사기술</a></li>
                </ul>
            </li>
            <li>
                <a href="#" onclick="onpage(3)">상품</a>
                <ul class="fullsnb">
                    <li><a href="#" onclick="onpage(4)">마스크</a></li>
                    <li><a href="#" onclick="onpage(5)">의류</a></li>
                </ul>
            </li>
            <li>
                <a href="#" onclick="onpage(6)">회사위치</a>
                <ul class="fullsnb">
                    <li><a href="#" onclick="onpage(7)">오시는길</a></li>
                </ul>
            </li>
            <li>
                <a href="#" onclick="onpage(8)">고객문의</a>
                <ul class="fullsnb">
                    <li><a href="#" onclick="onpage(9)">문의사항</a></li>
                </ul>
            </li>
        </ul>
    </div>

    <div class="swrap">
        <section id="se01" class="on">
            <div class="outbox">
                <div class="imgbox scaleitem">
                    <img src="./iMG/park1.jfif" alt="이미지" />
                </div>
                <div class="textbox upitem">
                    <div class="leftbox">hello</div>
                    <div class="rightbox">hello<br>hi</div>
                </div>
            </div>
        </section>
        <section id="se02">회사연혁</section>
        <section id="se03">회사기술</section>
        <section id="se04">상품</section>
        <section id="se05">마스크</section>
        <section id="se06">의류</section>
        <section id="se07">회사위치</section>
        <section id="se08">오시는길</section>
        <section id="se09">고객문의</section>
        <section id="se10">문의사항</section>
    </div>

    <script>
        let gnb = document.querySelector(".gnb")
        let nav = document.querySelector(".nav")
        let sections = document.querySelectorAll(".swrap > section")
        let ham = document.querySelector(".ham")
        let fullmenu = document.querySelector(".fullmenu")
        let closebtn = document.querySelector(".closebtn")

        gnb.addEventListener("mouseenter", function(){
            nav.classList.add("on")
        })
        gnb.addEventListener("mouseleave", function(){
            nav.classList.remove("on")
        })

        ham.addEventListener("click", function(){
            fullmenu.classList.add("on")
        })
        closebtn.addEventListener("click", function(){
            fullmenu.classList.remove("on")
        })

        function onpage(num){
            sections.forEach(function(item){
                item.classList.remove("on")
            })
            fullmenu.classList.remove("on")
            sections[num].classList.add("on")
        }

        let activeitems = document.querySelectorAll(".imgbox, .textbox")
        const observer = new IntersectionObserver(function(entries){
            entries.forEach(function(entry){
                if(entry.isIntersecting){
                    entry.target.classList.add("on")
                } else {
                    entry.target.classList.remove("on")
                }
            })
        }, {
            threshold: 0.3
        })

        activeitems.forEach(function(item){
            observer.observe(item)
        })
    </script>
</body>
</html>
