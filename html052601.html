<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반응형 1</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        /* 
            반응형 첫번쨰
            grid, clamp()
        */
        .wrap{
            width: min(1200px, 90%);
            margin: 50px auto;
            /* background-color: skyblue; */
        }

        .title{
            /* clamp(화면이 작을 떄, 기준, 화면이 클 때) */
            font-size: clamp(25px, 4vw, 50px);
            text-align: center;
            margin-bottom: 30px;
        }

        .grid{
            /* 부모가 자식을 다스리는 방법 2 :: grid */
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; 
        }

        .card{
            /* 위드는 안줌 */
            background-color: skyblue;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }

        .card h3{
            font-size: clamp(20px, 2.5vw, 40px);
            margin-bottom: 10px;
        }
        .card p{
            font-size: clamp(14px, 1.3vw, 20px);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h2 class="title">반응형 아이템</h2>
        <div class="grid">
            <div class="card">
                <h3>카드1</h3>
                <p>카드 설명 내용</p>
            </div>

             <div class="card">
                <h3>카드2</h3>
                <p>카드 설명 내용</p>
            </div>

             <div class="card">
                <h3>카드3</h3>
                <p>카드 설명 내용</p>
            </div>

             <div class="card">
                <h3>카드4</h3>
                <p>카드 설명 내용</p>
            </div>

        </div>
    </div>
</body>
</html>
