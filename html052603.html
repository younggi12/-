<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        .wrap{
            width: min(1200px, 90%);
            margin: 30px auto;
        }

        .grid{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card{
            height: 400px;
            border: 1px solid black;
            border-radius: 12px;
            overflow: hidden;
            padding: 20px;
            transition: all 0.4s;
        }
        .card:hover{
            transform: translateY(-10px);
        }
        .card img{
            width: 100%;
            height: 70%;
            object-fit: cover;
            border-radius: 12px;
        }
        .card h3{
            font-size: clamp(10px, 2vw, 20px);
            margin-top: 10px;
        }
        .card p{
            font-size: clamp(14px, 1vw, 20px);
            margin-top: 5px;
        }
        .card button{
            width: 100%;
            padding: 10px;
            border: none;
            background-color: black;
            color: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: clamp(14px, 1vw, 18px);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="grid">
            <div class="card">
                <img src="./iMG/keyboard.jpg" alt="키보드" />
                <h3>키보드</h3>
                <p>50,000원</p>
                <button>구매하기</button>
            </div>

            <div class="card">
                <img src="./iMG/mouse.jpg" alt="마우스" />
                <h3>마우스</h3>
                <p>30,000원</p>
                <button>구매하기</button>
            </div>

            <div class="card">
                <img src="./iMG/sony.jpg" alt="헤드셋" />
                <h3>헤드셋</h3>
                <p>40,000원</p>
                <button>구매하기</button>
            </div>
        </div>
    </div>
</body>
</html>
