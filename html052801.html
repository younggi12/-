<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        div{
            width: 100px;
            height: 100px;
            background-color: blue;

            position: absolute;

            animation-name: move;
            animation-duration: 5s;
            animation-iteration-count: infinite; 
            /* animation: move 5s infinite; */
            animation-fill-mode: backwards;
        }

        @keyframes move {
            0%{
                left: 0%;
                top: 0%;
            }

            25%{
                left: 500px;
                top: 0%;
            }

            50%{
                left: 500px; 
                top: 500px;
          
            }

            100%{
                left: 0%;
                top: 500px;
            }
        }

       
    </style>
</head>
<body>
    <div>

    </div>
</body>
</html>
