<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .div1{
            width: 600px;
            height: 10px;
            padding: 5px 0;
            background-color: gray;
        }

        .div2{
            width: 0%; /* 0% ~ 100%  */
            height: 10px; 
            background-color: gold; 
            position: relative;
            border-radius: 0 10px 10px 0;
            animation: barmove 8s linear infinite ;
        }

        .div3{
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background-color: black;
            position: absolute;
            right: 0;
        }

        @keyframes barmove {
            0%{
                width: 0;
            }

            100%{
                width: 100%;
            }
        }

       
    </style>
</head>
<body>
        <div class="div1">
            <div class="div2">
                <div class="div3"></div>
            </div>
        </div>
</body>
</html>
