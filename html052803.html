<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .wrap{
            width: 900px;
            height: 400px;
            background-image: linear-gradient(90deg, #222, #e413b0);
            position: relative;
        }    

        .wrap img:nth-child(1){
            position: absolute;
            left: 50px;
            top: 30px;
            width: 400px;
            height: 300px;
            object-fit: cover;
            z-index: 10;
        }

        .wrap img:nth-child(2){
            position: absolute;
            right: 320px;
            top: 30px;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            object-fit: cover;
            animation: ro 10s infinite linear;
        }

        @keyframes ro{
            0%{
                transform: rotate(0deg);
            }

            100%{
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
            <img src="./iMG/iphone1.jpg" alt="" />
            <img src="./iMG/iphone3.jpg" alt="" />
    </div>
</body>
</html>
