<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap {
            width: 900px;
            height: 400px;
            border-radius: 30px;
            background-image: linear-gradient(90deg, #222, #e413b0);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;  
        }

        .wrap p {
            width: 400px;
            padding-left: 50px;
            font-size: 50px;
            color: white;
            position: relative;
            z-index: 2;
        }

        .wrap img {
            width: 350px;
            height: 320px;
            border-radius: 30px;
            object-fit: cover;
            animation: move 10s infinite linear;
            position: relative;
            z-index: 2;
        }

        .one {
            width: 350px;
            height: 350px;
            position: absolute;  
            top: 90%;
            left: 5%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            z-index: 1;
            animation: more 2s infinite linear;
        }

        @keyframes move {
            0%{ 
                transform: rotate(0deg); 
            }
            100%{ 
                transform: rotate(15deg); 
            }
        }

        @keyframes more {
            0%{ 
               transform: scale(0.5);
            }

            100%{ 
                transform: scale(5);
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <img src="./iMG/iphone1.jpg" alt="" />
        <p>CSS ANIMATION</p>
        <div class="one"></div>  
    </div>
</body>
</html>
