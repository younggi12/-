<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> bmi 판정</h1>
    <label for = "cm">키 : </label>
    <input id="cm" type="number" placeholder="키를 입력(cm)" /><br>
    <label for = "kg">몸무게 : </label>
    <input id="kg" type="number" placeholder="몸무게를 입력(kg)" />
    <button id="btn">bmi 확인</button>
    <div id="ans">여기는 정상/과체중 표시 자리입니다</div>
    <script>
        let cm = document.getElementById("cm")
        let kg = document.getElementById("kg")
        let btn = document.getElementById("btn")
        let ans = document.getElementById("ans")
        
        btn.onclick = function(){
            let bmi = Number( kg.value ) / ( ( Number( cm.value )*0.1 ) * ( Number( cm.value )*0.1 ) )
            if( (bmi *100) >= 23){
                console.log(bmi*100)
                ans.innerHTML = "과체중 또는 비만입니다"
            }else{
                ans.innerHTML = "정상체중 또는 저체중입니다"
            
            } // if문 종료
         
            } // btn.onclick 끝나는 자리 괄호안에 모든 자료 소멸 
    </script>
</body>
</html>
