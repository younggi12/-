<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outbox{
            padding: 30px;
            width: 500px;
            /* height: 500px; */
            border: 4px solid white;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .inbox{
            width: 75px;
            height: 75px;
            border-radius: 5px;
            background-color: black;
        }
        .first{
            background-color: white;
        }
    </style>
</head>
<body>
    <div class="outbox" id="outbox">
      
    </div>
    <script>
        let outbox = document.getElementById("outbox")
        for( let i = 1; i<=25; i++){
            if( i%2 == 0){
                 outbox.innerHTML += "<div class='inbox first' >box" + i + "</div>"
            }else{
                 outbox.innerHTML += "<div class='inbox' >box" + i + "</div>"
            }
           

        }
    </script>
</body>
</html>
