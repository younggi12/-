<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input id="num1" type="number" placeholder="숫자를 입력해주세요" />
    <button id="btn">확인</button>
    <script>
        let num1 = document.querySelector("#num1")
        let btn = document.querySelector("#btn")
        btn.addEventListener("click", function(){
            let inNum = Number( num1.value )
            switch(inNum){
                case inNum >= 90 : 
                document.write("잘한다"+"<br>")
                break 
                case 80 : 
                document.write("중간"+"<br>")
                break 
                case 70 : 
                document.write("못한다"+"<br>")
                break 
                default : 
                document.write("숫자를 다시 입력해주세요"+"<br>")
                break 

            }
        })
    </script>
</body>
</html>
