<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let num = -3.18493
    document.write( "Math.floor : " + Math.floor(num)+"<br>")
    document.write( "Math.round : " + Math.round(num)+"<br>")
    document.write( "toFixed : " + num.toFixed(2)+"<br>")
    document.write( "Math.abs : " + Math.abs(num)+"<br>")
    
    let num2 = Math.max(2,5,9,10)
    document.write( "Math.max : " + num2 +"<br>")
    let num3 = Math.min(2,5,9,10)
    document.write( "Math.min : " + num3 +"<br>")

    document.write( "Math.random() : " +Math.floor( Math.random()*5+2) +"<br>")
    </script>
</body>
</html>
