<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <!-- 함수를 이용합니다. 강아지 정보를 입력하고  
          리턴을 받아서 함수를 호출했을떄 
          sound(): "멍멍" 라고 출력
          run():  "달립니다" 라고 출력 -->
</head>
<body>
    <script>

        let dog = function(){
            return{
                name : "happy",
                color : "white",
                sound : function(){
                let aa = 0
                aa++ 
                document.write( "멍멍" + "<br>" + aa + "번 짖었습니다" + "<br>" )
                },

                run : function(){
                document.write( "달립니다" + "<br>" )
                }
            }
        } 

        let dogs = dog()
        document.write( `${dogs.name}가 지금` )
        dogs.sound()
        dogs.run()

    </script>
</body>
</html>
