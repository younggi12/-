<!DOCTYPE html>
<html>
<body>
    <div class="display"></div>
<script>
    // 생성자 함수를 이용하여 출력하세요
    // 1. 상품이름과 가격을 매개변수로 합니다
    //    참고사항 ===> 가격 = 가격 * 0.9 : : 10% 할인된 금액
    function Sale(name, price) {
        this.na = name
        this.pr = price * 0.9           // 참고사항 : 가격 = 가격 * 0.9

        // 2. discount() 함수 호출시 10% 할인된 가격으로 출력
        this.discount = function() {

            // 3. 출력시 "***상품의 10% 할인된 가격은 ***원 입니다" 으로 표시
            return `${this.na}상품의 10% 할인된 가격은 ${this.pr}원 입니다`
        }
    }

    // 참고 :: new를 사용하여 함수 생성하기
    // 위 생성자함수 값의 결과를 배열로 만들어보자
    let allSale = [
        new Sale("운동화", 15000),
        new Sale("샌들", 10000),
        new Sale("모자", 5000),
    ]

    let display = document.querySelector(".display")

    // 참고 :: 생성된 함수의 입력된 변수값으로 출력하기
        allSale.forEach(function(item) {
        display.innerHTML += item.discount() + "<br>"
    })
</script>
</body>
</html>
