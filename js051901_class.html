<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>상품목록</h1>

    <div class="outbox" >
        <h2>상품선택</h2>

        <label>
            <input type="radio" name="items" value="노트북" />
            노트북
        </label>

        <label>
            <input type="radio" name="items" value="컴퓨터" />
            컴퓨터
        </label>

        <label>
            <input type="radio" name="items" value="맥북" />
            맥북
        </label>

        <button onclick="showitems()">상품추가</button>

        <div id="dis" ></div>
        <div id="total" >총 금액</div>
    </div>

    <script>
        class Items{
            constructor(name, price){
                this.name = name
                this.price = price
            }
             discount(){
                return this.price * 0.9
             }
            
        }

        let cart = []

        function showitems(){
            let seletitem = document.querySelector("input[name ='items']:checked")
            let dis = document.querySelector("#dis")
            let total = document.querySelector("#total")
            if(!seletitem){
                dis.innerHTML = "상품을 선택하세요"
                return
            }
            
            let item
            if(seletitem.value === "노트북"){
                item = new Items("노트북", 3000000)
            }else if(seletitem.value === "컴퓨터"){
                item = new Items("컴퓨터", 2000000)
            }else if(seletitem.value === "맥북"){
                item = new Items("맥북", 4000000)
            }

            cart.push( item )
            let display = ''
            let sum = 0 
            cart.forEach(function(it){
                display += `<div>
                             상품명 : ${it.name}<br>
                             상품가격 : ${it.price}원<br>
                             할인가 : ${it.discount()}원<br>
                           </div>`
                sum += it.discount()
            })

            dis.innerHTML = display
            total.innerHTML = `총 금액 : ${sum}원`
        }
    
        // let day = new Date() 자바스크립트가 만든(내장) 객체(클래스)  
    </script>
</body>
</html>
