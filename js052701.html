<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>json 기본</title>
</head>
<body>
    <!-- json() 
    javascript 객체, 배열로 파싱해주는 함수 
    let a = {name: "홍길동", "age":20}
    -->
    <h2>json파싱</h2>
    <div id="dis"></div>

    <script>
        // json문자열 :: javascript는 알지 못하는 문자열 상태 
    let jitem = `
        [
            {"name" : "사과", "price" : 500},
            {"name" : "바나나", "price" : 1000}
        ]
    `

    // json문자열을 javascript 객체로 변환 
    let data = JSON.parse(jitem)
    // data ::javascript 객체 
    // data [ {name : "사과", "price : 500"},
    //        {name : "바나나", "price : 1000"} ]        
    let dis = document.getElementById("dis")
    data.forEach(function(item){
        dis.innerHTML += `${item.name} : ${item.price} <br>` 
    })
    </script>
</body>
</html>
