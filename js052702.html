<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>과일목록</h2>
    <div id="dis"></div>

    <script>
        async function jsonload(item){
            try{
                // res :: json 문자열(js가 알지 못함)
                let res = await fetch("data.json")
                console.log("res", res);

                // js 객체로 파싱 data는 js객체
                let data = await res.json()
                console.log("data", data);

                let html = ''
                data.forEach(function(item){
                    html += `${item.name} : ${item.price}원 <br>`
                })
                let dis = document.querySelector("#dis")
            }catch(err){
                console.error("파싱에러발생" , err)
            }
        }

        jsonload()
    </script>
</body>
</html>
