<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        .wrap{
            width: min(1200px, 90%);
            margin: 30px auto;
            font-size: 25px;
        }

        .wrap>h2{
            font-size: clamp(4rem, 4vw, 4rem);
        }

        .showwrap{
            display: grid;
            grid-template-columns: repeat(4, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
            border-radius: 20px;
        }

        .card {
            height: 150px;
            border-radius: 20px;
        }

        .card button{
            width: 60%;
            height: 60%;
            background-color: black;
            color: white;
            border-radius: 30px;
        }


        /* 테블릿 버전*/
        @media(max-width:1024px){
            .wrap{
                font-size: 20px;
            }
            .showwrap{
                grid-template-columns: repeat(2, minmax(250px, 1fr));
                gap: 80px;
                padding: 100px;
                /* background-color: pink; */
            }
            .card button{
                background-color: green;
            }
        }

        /* 모바일 버전*/
        @media(max-width:600px){
            .wrap{
                font-size: 14px;
            }
            .showwrap{
                grid-template-columns: repeat(1, minmax(250px, 1fr));
                gap: 7px;
                padding: 20px;
            }
            .card button{
                background-color: blueviolet;
            }
        }
    </style>
</head>
<body>
     <div class="wrap">
        <h2>Responsive</h2>
        <div class="showwrap" id="showwrap">

        </div>
    </div>

    <script>
        async function jsonwrap(){
        let showwrap = document.querySelector("#showwrap")
            try{
                const res = await fetch("data4.json")
                const data = await res.json();
                console.log(data)

                let html = ''
                data.forEach(function(item){
                    html += `
                            <div class='card'>
                                <h2>${item.title}</h2>
                                <p>${item.desc}</p>
                                <button>${item.btn}</button>
                            </div>
                            `
                })

                showwrap.innerHTML = html
            }catch(err){
                console.log("에러 확인", err)
            }
        }

        jsonwrap()
    </script>
</body>
</html>
