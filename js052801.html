<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- promise    
     자바스크립트는 시간이 오래 걸리는 작업(파일로딩, 타이머, 네트워크)은
     비동기 방식으로 처리 (결과가 나중에 오기 때문)
     이 방식을 처리하는 도구의 대표 promise 

     resolve(성공값), reject(실패값) 
     let pro = new promise(function(resolve, reject){
        resolve("성공값 호호호호호호")
     })

        프로미스가 작업을 성공했을때, resolve 괄호안에 있는 값을 가져간다.
        then :: 만약 성공하였다면 성공값(resolve)을 처리한다
        pro.then(function(k){
            console.log( "나는 then이 처리한다", k )
        })

        작업이 실패시 
        pro.catch(function(k){
            console.log( "나는 catch가 처리한다", k )
        })

        function(){
        }
        ==> () => { }
    -->
    <script>
        let pro = new Promise((resolve, reject)=>{
            // 어떤 작업을 한다 
            resolve("good ! 성공 !!") //작업이 성공했을때 보내는 값
            reject("no~ 실패 !!") // 작업이 실패했을떄 보내는 값
        })

        pro.then((v)=>{ // then :: 성공값을 가져옴
            document.write( "나는 then임", v)
        })

        
        let bad = new Promise((_, reject)=>{
            reject( new Error("에러발생"))
        })

        bad.catch((e)=>{ // catch :: 실패값을 가져옴
            document.write("여기는 catch안이다", e)
        })
    </script>
</body>
</html>
