<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function abc(){
            let pro = new Promise((resolve, reject)=>{
                setTimeout(()=>{
                    if( Math.random() > 0.5){
                        resolve( "0.5보다 무조건 큼" )
                    }else{
                        reject( new Error("0.5보다 무조건 작음") )
                    }
                }, 1000)
            })

            return pro
        }
        
        abc()

        .then( (v)=>{
            document.write( "여기는 then : ", v )
        })

        .catch( (e)=>{
            document.write( "여기는 catch : ", e)
        })

        .finally( ()=>{
            document.write( "여기는 finally : ")
        })
    </script>
</body>
</html>
